<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A Java knowledge base distilled from eight foundational books — topics, knowledge graph, and class reference." />
    <title>Java::Compendium</title>
    <script>
      // Set theme before first paint to avoid flash.
      try {
        var t = localStorage.getItem('jkb-theme')
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
